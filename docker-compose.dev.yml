services:
  mysql-dev:
    image: mysql:8.0
    container_name: controlalo-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootdev
      MYSQL_DATABASE: controlalo_dev
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootdev"]
      interval: 5s
      timeout: 5s
      retries: 20

  phpmyadmin:
    image: phpmyadmin:5
    container_name: controlalo-phpmyadmin-dev
    restart: unless-stopped
    environment:
      PMA_HOST: mysql-dev
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootdev
      UPLOAD_LIMIT: 64M
    ports:
      - "8080:80"
    depends_on:
      mysql-dev:
        condition: service_healthy

volumes:
  mysql_dev_data:
